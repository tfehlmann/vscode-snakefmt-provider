name: 'Lint'
description: 'Lint TypeScript and Python code'

inputs:
  node_version:
    description: 'Version of Node to install'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}

    - name: Enable Corepack
      run: corepack enable
      shell: bash

    - name: Find pnpm store
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: pnpm cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-lint-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-lint-

    - name: Install Node dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Lint TypeScript code
      run: pnpm run lint
      shell: bash

    - name: Check TypeScript format
      run: pnpm run format-check
      shell: bash

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: '0.11.24'
        enable-cache: true

    # This will install libraries to a target directory.
    - name: Install bundled python libraries
      run: uv run --frozen --group dev nox --session install_bundled_libs
      shell: bash

    - name: Check linting and formatting
      run: uv run --frozen --group dev nox --session lint
      shell: bash
