# Publish extension to VS Code Marketplace and Open VSX Registry
#
# Triggered when a GitHub Release is published.
#
# Required repository secrets:
#   VSCE_PAT  - Azure DevOps Personal Access Token
#               Azure DevOps -> User Settings -> Personal Access Tokens
#               Scope: "Marketplace (Manage)"
#   OVSX_PAT  - Open VSX Access Token
#               https://open-vsx.org -> User Settings -> Access Tokens
#
# One-time setup for Open VSX:
#   pnpm exec ovsx create-namespace tfehlmann --pat <OVSX_PAT>

name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  NODE_VERSION: 22

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Find pnpm store
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-publish-build-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-publish-build-

      - name: Use Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.16'
          enable-cache: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install bundled python libraries
        run: uv run --frozen --group dev nox --session install_bundled_libs

      - name: Build VSIX
        run: pnpm exec vsce package --no-dependencies -o snakefmt.vsix ${{ github.event.release.prerelease && '--pre-release' || '' }}

      - name: Upload VSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: formatter-package
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 7

  publish-vscode-marketplace:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download VSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: formatter-package

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish --packagePath *.vsix ${{ github.event.release.prerelease && '--pre-release' || '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-open-vsx:
    name: Publish to Open VSX
    needs: build
    runs-on: ubuntu-latest
    environment: open-vsx
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download VSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: formatter-package

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Open VSX
        run: pnpm exec ovsx publish *.vsix --pat "$OVSX_PAT" ${{ github.event.release.prerelease && '--pre-release' || '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
